async function seedAll() {
  const log = document.getElementById('log');
  log.innerHTML = 'Starting seed process…\n\n';

  for (let i = 0; i < SAMPLES.length; i++) {
    const s = SAMPLES[i];
    try {
      await atCreate(s);
      log.innerHTML += `<span class="ok">✓ [${i+1}/5] Created: ${s.doctor_name} — ${s.clinic_name}</span>\n`;
    } catch(e) {
      log.innerHTML += `<span class="err">✕ [${i+1}/5] Failed: ${s.doctor_name} — ${e.message}</span>\n`;
    }
    // Small delay to respect Airtable rate limits
    await new Promise(r => setTimeout(r, 250));
  }

  log.innerHTML += '\n<span class="ok">🎉 Done! Check your Airtable base and live dashboards.</span>';
}
