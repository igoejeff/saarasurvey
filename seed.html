<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Saara — Seed</title>
  <style>
    body { font-family: -apple-system, sans-serif; background: #000; color: #f2f2f7; padding: 40px; }
    h1 { font-size: 20px; margin-bottom: 20px; }
    button { background: #4f8ef7; border: none; border-radius: 8px; color: #fff; font-size: 14px; font-weight: 700; padding: 12px 22px; cursor: pointer; margin-right: 10px; margin-bottom: 20px; }
    #log { background: #111; border-radius: 10px; padding: 20px; font-size: 13px; line-height: 1.9; white-space: pre-wrap; min-height: 60px; }
  </style>
</head>
<body>
<h1>Saara — Airtable Connection Test &amp; Seed</h1>
<button onclick="testConn()">Step 1 — Test Connection</button>
<button onclick="insertData()" style="background:#34d399;color:#000">Step 2 — Insert 5 Samples</button>
<div id="log">Click Step 1 first…</div>

<script>
var TOKEN = ['patmIwfdgi','qdblRZT.3e80ba0bed90d2bc2a55cb8e','aec276d49e62a997bcd73073ee6d014a2b704d8b'].join('');
var BASE  = 'appB8vcgsTlAkyhayltbloLPOhwEUDWTWbe';
var TBL   = 'tbloLPOhwEUDWTWbe';
var URL   = 'https://api.airtable.com/v0/' + BASE + '/' + TBL;
var HDR   = { 'Authorization': 'Bearer ' + TOKEN, 'Content-Type': 'application/json' };

function log(msg) {
  document.getElementById('log').innerHTML += msg + '\n';
}

async function testConn() {
  document.getElementById('log').innerHTML = '';
  log('Connecting to Airtable...');
  try {
    var res = await fetch(URL + '?maxRecords=1', { headers: HDR });
    var txt = await res.text();
    log('HTTP Status: ' + res.status);
    log('Response: ' + txt.substring(0, 800));
    if (res.ok) {
      log('\n✅ CONNECTION WORKS — now click Step 2');
    } else {
      log('\n❌ FAILED — see error above');
    }
  } catch(e) {
    log('❌ Network error: ' + e.message);
  }
}

async function insertData() {
  document.getElementById('log').innerHTML = '';
  log('Inserting records...\n');

  var samples = [
    { doctor_name: 'Dr. Rachel Kim', clinic_name: 'Cascade Family Medicine', specialty: 'Family Medicine', email: 'rkim@cascadefamily.com', pain_billing: 5, pain_compliance: 4, pain_scheduling: 3, pain_clinical_notes: 4, pain_staff: 3, pain_patient_comms: 2, commitment_tier: 'Founding Partner', soft_commitment: true, demo_interest: 'Schedule me ASAP', submitted_at: Date.now() - 172800000, is_starred: true, admin_note: 'High-value lead', additional_comments: 'We lose nearly $18K/month to denials alone.' },
    { doctor_name: 'Dr. Marcus Webb', clinic_name: 'Northside Orthopedic Group', specialty: 'Orthopedic Surgery', email: 'mwebb@northsideortho.com', pain_billing: 4, pain_compliance: 5, pain_scheduling: 4, pain_clinical_notes: 3, pain_staff: 4, pain_patient_comms: 3, commitment_tier: 'Founding Partner', soft_commitment: true, demo_interest: 'Schedule me ASAP', submitted_at: Date.now() - 345600000, is_starred: true, admin_note: 'Orthopedic group — 40+ prior auths/week', additional_comments: 'Prior auth is killing us — 3 full-time staff just handling that.' },
    { doctor_name: 'Dr. Priya Nair', clinic_name: 'Sunridge Internal Medicine', specialty: 'Internal Medicine', email: 'pnair@sunridgemd.com', pain_billing: 4, pain_compliance: 3, pain_scheduling: 5, pain_clinical_notes: 5, pain_staff: 4, pain_patient_comms: 3, commitment_tier: 'Early Access', soft_commitment: true, demo_interest: 'Schedule me ASAP', submitted_at: Date.now() - 86400000, is_starred: true, admin_note: 'Solo practice — 4+ hrs/day on documentation', additional_comments: 'I spend more time on documentation than with patients.' },
    { doctor_name: 'Dr. James Okafor', clinic_name: 'Metro Cardiology Associates', specialty: 'Cardiology', email: 'jokafor@metrocardio.com', pain_billing: 5, pain_compliance: 4, pain_scheduling: 3, pain_clinical_notes: 4, pain_staff: 5, pain_patient_comms: 4, commitment_tier: 'Early Access', soft_commitment: false, demo_interest: 'Send info first', submitted_at: Date.now() - 518400000, is_starred: true, admin_note: 'Staff burnout & high turnover', additional_comments: 'Staff burnout is our biggest hidden cost. Lost 4 billing staff in 18 months.' },
    { doctor_name: 'Dr. Sandra Flores', clinic_name: 'Westlake Pediatric Care', specialty: 'Pediatrics', email: 'sflores@westlakepeds.com', pain_billing: 3, pain_compliance: 3, pain_scheduling: 4, pain_clinical_notes: 4, pain_staff: 3, pain_patient_comms: 5, commitment_tier: 'Stay Informed', soft_commitment: false, demo_interest: 'Keep me updated', submitted_at: Date.now() - 259200000, is_starred: false, admin_note: '', additional_comments: 'Patient no-shows and communication gaps are costing us.' }
  ];

  for (var i = 0; i < samples.length; i++) {
    try {
      var res = await fetch(URL, {
        method: 'POST',
        headers: HDR,
        body: JSON.stringify({ fields: samples[i] })
      });
      var data = await res.json();
      if (res.ok) {
        log('✅ [' + (i+1) + '/5] ' + samples[i].doctor_name + ' — ID: ' + data.id);
      } else {
        log('❌ [' + (i+1) + '/5] ' + samples[i].doctor_name + ' — ' + JSON.stringify(data));
      }
    } catch(e) {
      log('❌ [' + (i+1) + '/5] ' + e.message);
    }
    await new Promise(function(r){ setTimeout(r, 300); });
  }
  log('\nDone! Check your Airtable base.');
}
</script>
</body>
</html>
